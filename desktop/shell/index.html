<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memorix</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f9fc;
        color: #1f2937;
      }
      main {
        max-width: 420px;
        padding: 32px;
        text-align: center;
      }
      .mark {
        width: 54px;
        height: 54px;
        margin: 0 auto 18px;
        border: 6px solid #0d47a1;
        border-right-color: #00b8c8;
        border-radius: 16px;
        animation: pulse 1.4s ease-in-out infinite;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        color: #0d47a1;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.7;
      }
      .error {
        color: #b42318;
      }
      @keyframes pulse {
        50% { transform: scale(0.94); opacity: 0.72; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>Memorix</h1>
      <p id="status">正在启动本地知识引擎...</p>
    </main>
    <script>
      window.showStartupError = (message) => {
        document.querySelector(".mark").style.animation = "none";
        const status = document.querySelector("#status");
        status.className = "error";
        status.textContent = `启动失败：${message}`;
      };
    </script>
  </body>
</html>
