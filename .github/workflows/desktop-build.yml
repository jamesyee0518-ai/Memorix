name: Desktop builds

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop/**"
      - "web/**"
      - "src/**"
      - ".github/workflows/desktop-build.yml"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-14
            rid: osx-x64
            artifact: memorix-macos-x64
            bundle_paths: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            artifact: memorix-windows-x64
            bundle_paths: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe
          - name: Linux x64
            os: ubuntu-24.04
            rid: linux-x64
            artifact: memorix-linux-x64
            bundle_paths: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/rpm/*.rpm

    env:
      MEMORIX_DESKTOP_RUNTIME_ID: ${{ matrix.rid }}
      MEMORIX_DESKTOP_SELF_CONTAINED: "true"
      MEMORIX_DESKTOP_NO_RESTORE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Restore self-contained API runtime
        run: dotnet restore src/KnowledgeEngine.Api/KnowledgeEngine.Api.csproj -r ${{ matrix.rid }}

      - name: Build native desktop bundle
        run: npm run build
        working-directory: desktop

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_paths }}
          if-no-files-found: error
